[[paper]]
wp = "01"
seriesNumber = "RTR-WP-001"
docid = "RTR/WP/2026-06/01"
date = "2026-06"
version = "v0.1.0"
status = "Draft"
title = "A Consolidated Real Per-Capita Series for Public Library Expenditure in India"
subtitle = "A Measurement Note in the Public-Finance Tradition, 2014–15 to 2024–25"
shortTitle = "A Consolidated Real Per-Capita Series"
kicker = "PUBLIC FINANCE · MEASUREMENT · LIBRARIES"
standfirst = "What India spends, per person, per year, in real terms, on its public libraries — a consolidated state-plus-Centre series, 2014–15 to 2024–25."
keywords = "public libraries · India · government expenditure · fiscal federalism · GFSM 2014 · per-capita spending"
subjects = ["Economics", "Public Finance", "Public Policy"]
jel = "H72, H75, I22"
abstract = """
We present the first consolidated state-plus-Centre real per-capita series for public-library expenditure in India under IMF GFSM 2014 conventions, covering 2014–15 through 2024–25. The series builds on the state-level compilation of Kulkarni et al. (2025) from CAG Combined Finance and Revenue Accounts (Major Head 2205, Sub-head 105) through three steps: replacing the Census 2011 fixed population denominator with the Government's Technical Group annual projections, deflating with the MoSPI implicit GDP deflator, and integrating Central transfers through the Raja Rammohun Roy Library Foundation (RRRLF). The headline finding is that the consolidated real per-capita series peaked at ₹8.17 in 2018–19 (constant 2011–12 ₹) and stood at ₹4.77 by 2024–25 — a 42% fall from peak, with the contraction concentrated in the Central transfer (RRRLF nominal grant fell 65%, from ₹76.7 cr in 2017–18 to ₹27.1 cr in 2022–23). The nominal series in the existing literature (₹11.64 → ₹9.51) understates the real-terms peak by 48% and obscures the post-2018 contraction entirely. It is intentionally descriptive; mechanism and distribution are taken up in companion papers."""

[[paper]]
wp = "02"
seriesNumber = "RTR-WP-002"
docid = "RTR/WP/2026-06/02"
date = "2026-06"
version = "v0.1.0"
status = "Draft"
title = "The Convergence Blueprint"
subtitle = "A Tax-Funded National Public Library Network by 2035"
shortTitle = "The Convergence Blueprint"
kicker = "FISCAL FEDERALISM · CONVERGENCE · 2035"
standfirst = "A state-government-led roadmap to a tax-funded national public library network by 2035 — about 0.20% of state revenue, to the Tamil Nadu standard."
keywords = "public libraries · fiscal federalism · convergence · Finance Commission · SASCI · library cess · capital expenditure"
subjects = ["Public Policy", "Public Finance", "Fiscal Federalism"]
jel = "H54, H72, H77"
abstract = """
India's consolidated public-library expenditure stands at ₹4.77 real per capita (see the Measurement paper). Tamil Nadu — the one state to have sustained a statutory library cess — is on track to ₹21.90 by 2034–35. This paper engineers a state-government-led convergence path to a ₹22 real-per-capita all-India target by 2035: roughly ₹3,425 crore per year of recurrent expenditure plus about ₹20,000 crore of capital expenditure to build the ~38,000 libraries the network requires — an envelope of about 0.20% of cumulative state revenue over the decade. It locates the financing in instruments that already exist (Sixteenth Finance Commission local-body grants, the dormant SASCI cultural sub-tranche, state statutory cesses) and proposes re-integrating BharatNet, the Common Service Centres, MGNREGA-class construction, and the RRRLF into a single physical reading-commons architecture."""

[[paper]]
wp = "03"
seriesNumber = "RTR-WP-003"
docid = "RTR/WP/2026-06/03"
date = "2026-06"
version = "v0.1.0"
status = "Draft"
title = "The Grammar of Refusal"
subtitle = "Four Mechanisms of Institutional Contraction in India's Library Sector"
shortTitle = "The Grammar of Refusal"
kicker = "CENTRALLY SPONSORED SCHEMES · THE PARLIAMENTARY RECORD"
standfirst = "How a Centrally Sponsored Scheme was unmade by procedure — four mechanisms of institutional contraction, read from the parliamentary record, 2015–2026."
keywords = "Centrally Sponsored Schemes · cooperative federalism · RRRLF · National Mission on Libraries · public libraries · parliamentary record"
subjects = ["Political Science", "Political Economy", "Public Administration", "Contemporary History"]
abstract = """
Between 2017–18 and 2022–23, the Government of India's grant to the Raja Rammohun Roy Library Foundation (RRRLF) — the principal Central transfer to the public-library function — fell from ₹76.7 cr to ₹27.1 cr, a 65% nominal contraction. The National Mission on Libraries (NML), launched under the 12th Plan in 2012, declined from a Budget Estimate of ₹118.5 cr in FY 2019–20 to a Revised Estimate of ₹0.73 cr in the same year — a 99.4% RE-stage cut. The consolidated state-plus-Centre real per-capita expenditure on public libraries fell 42% from peak by 2024–25. This paper argues that the contraction was not an accident of "low priority" but an engineered procedural contraction, traceable through a four-mechanism causal chain visible in the Department-related Parliamentary Standing Committee on Transport, Tourism and Culture's 245th, 258th, 264th, 277th, 310th, 328th, and 382nd Reports — the upstream Cabinet-ratified rationalisation of Centrally Sponsored Schemes of 3 August 2016, and the three downstream institutional failures it set in motion."""

[[paper]]
wp = "04"
seriesNumber = "RTR-WP-004"
docid = "RTR/WP/2026-06/04"
date = "2026-06"
version = "v0.1.0"
status = "Draft"
title = "The Misidentification of the Bottleneck"
subtitle = "How the Reading Commons Was Foreclosed, 1924–2026"
shortTitle = "The Misidentification of the Bottleneck"
kicker = "ED-TECH · THE COMMONS · GLOBAL HISTORY"
standfirst = "A century-long error, read through India's 2006 fork — the reading commons foreclosed by mistaking the bottleneck for a delivery-technology problem."
keywords = "ed-tech history · Network Society · the commons · behaviorism · associated living · ICT4D · end of history"
subjects = ["Science and Technology Studies", "Global History", "Critical Theory"]
abstract = """
India's library decline is a local instance of a century-long global error: the repeated misidentification of the bottleneck to mass enlightenment as a delivery-technology problem when the actual bottleneck has always been institutional scaffolding — the physical, communal "space of places" where associated living is enacted. From Pressey's 1924 teaching machine through Skinner's behaviorist boxes, the 2012 "Year of the MOOC," and the 2020s AI-tutor mandate, each generation scaled up the "space of flows" and displaced the commons. We read India's 2006 National e-Governance Plan pivot toward transactional kiosks (CSC) over community knowledge-commons (MSSRF/Akshaya) as the decisive local foreclosure, set against the post-1989 global decline of the public commons and the "end of history" technocratic settlement."""

