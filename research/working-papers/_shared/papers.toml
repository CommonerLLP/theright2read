shortTitle = "The Infrastructure of Demography"
kicker = "ANTI-CASTE · FOUNDATIONAL LEARNING · DEMOGRAPHY"
standfirst = "The public library as the missing infrastructure of the demographic dividend — read through the anti-caste lineage of Phule and Ambedkar."
keywords = "demographic dividend · foundational learning · anti-caste · Phule · Ambedkar · public libraries"
subjects = ["Sociology", "Education", "Anti-caste / Dalit Studies"]
abstract = """
In an era of deep educational crisis, India's public library is the "missing infrastructure" of the demographic dividend. This paper situates the library not as a cultural luxury, but as a democratic necessity grounded in the anti-caste lineage of Phule and Ambedkar."""

[[paper]]
wp = "06"
seriesNumber = "RTR-WP-006"
docid = "RTR/WP/2026-06/06"
date = "2026-06"
version = "v0.2.0"
status = "Draft"
title = "Whom Does the City Allow to Read?"
subtitle = "Caste, Democracy, and the Public Library in the Indian City"
shortTitle = "Whom Does the City Allow to Read?"
kicker = "CASTE · DEMOCRACY · THE PUBLIC LIBRARY"
standfirst = "Caste, democracy, and the public library in the Indian city — how Ahmedabad and Delhi keep the library on paper while withdrawing it as a public."
keywords = "public libraries · India · caste · democracy · urban inequality · Ahmedabad · Delhi · library access · transparency"
subjects = ["Urban Studies", "Sociology", "Anti-caste Studies", "Human Geography"]
abstract = """
In modern India the public library was supposed to be an instrument of emancipation: access to the printed word was claimed as a route out of caste hierarchy, and the free public library became its civic form. This paper argues that in Ahmedabad and Delhi that promise is being reversed by stealth. The library is being unmade as a public through two quiet techniques. The first is non-disclosure: cities publish buildings, boards, budgets, and collections while withholding almost any branch-level evidence of service — Delhi's circulation has fallen by three-quarters and its staff vacancy nears half; Ahmedabad enrols under 0.4 percent of residents. The second is identity-gating: Aadhaar, guarantors, attestation, and cash deposits screen the library's "public" by class and caste. The two exclusions fall on the same people. An institution that survives entirely on paper while receding entirely in practice has not failed: it has been converted from something meant to dissolve caste into something that administers it."""

[[paper]]
wp = "07"
seriesNumber = "RTR-WP-007"
docid = "RTR/WP/2026-06/07"
date = "2026-06"
version = "v0.1.0"
status = "Draft"
title = "A Library Is Not a Content Dump"
subtitle = "A UX Review of NDLI, Rashtriya e-Pustakalaya, and Public Digital Library Models"
shortTitle = "A Library Is Not a Content Dump"
kicker = "DIGITAL LIBRARIES · UX · PUBLIC ACCESS"
standfirst = "A heuristic UX review of India's two national digital library surfaces, and a service-model comparison with public digital libraries abroad."
keywords = "digital libraries · public libraries · India · user experience · NDLI · Rashtriya e-Pustakalaya · access · multilingual reading"
subjects = ["Library and Information Science", "Human-Computer Interaction", "Public Policy", "Education"]
abstract = """
India now has two public-facing national digital library surfaces carrying overlapping but different promises. The National Digital Library of India at IIT Kharagpur presents itself as a single-window educational repository and institutional library-services platform. Rashtriya e-Pustakalaya presents itself as a free children's and youth reading library in Indian languages. This paper reviews both services as public-library interfaces, not simply as websites. The finding is blunt: NDLI is not merely a garbage dump, because it has real domain structure, language affordances, and institutional services; but for ordinary readers its repository-first information architecture often turns structure into dump-like experience. Rashtriya e-Pustakalaya is conceptually closer to the public-library need, especially for children's reading, but its app-first implementation undermines public access: the public About route is JavaScript-only, and the app source blocks right-click, print shortcuts, and developer tools. The comparison with Trove, Europeana, DPLA, the National Library of Norway, Palace, Libby, Open Library, Project Gutenberg, StoryWeaver, and Bookshare shows that India does not need one giant portal. It needs four connected service layers: a reader library, a scholarly repository, a public-library network layer, and a preservation-and-rights layer."""

[[paper]]
wp = "08"
seriesNumber = "RTR-WP-008"
docid = "RTR/WP/2026-06/08"
date = "2026-06"
version = "v0.1.0"
status = "Draft"
title = "From Reader to User"
subtitle = "Eighty Years of the Indian Library Association and the Changing Public of the Library, 1942–2019"
shortTitle = "From Reader to User"
kicker = "DISCOURSE · LIBRARIES · CASTE · HISTORY"
standfirst = "A discourse history of eighty years of Indian Library Association proceedings: how the library's reader became a user, and how the discourse kept caste unsayable."
keywords = "public libraries · India · caste · Indian Library Association · reading publics · discourse analysis · Delhi Public Library · UNESCO · digital libraries"
subjects = ["Library and Information Science", "South Asian Studies", "Sociology", "Public Policy"]
abstract = """
This paper reads eighty years of Indian Library Association conference proceedings (1942–2019), alongside the Delhi Public Library's founding records, the government library-committee reports compiled by the Central Secretariat Library, and the post-1990 parliamentary record, as depositions of a single discursive formation. It argues that the profession's drift from reader to user is the dissolution of a democratic reading subject into a system-function, and that this dissolution is the mechanism by which the discourse keeps the caste question unsayable. The state costed universal public-library provision repeatedly across a forty-five-year committee chain and refused it by deferral; the recurring claim that the library is a State subject is shown to be a declined reform rather than a constitutional given. A comparative control — the 1996 Daedalus issue in which the South African and Brazilian chapters name race and social inequality while the Indian chapter does not name caste — shows the silence is specific to the Indian caste case. Because the public library matters most to those who cannot buy books, disproportionately the caste-Bahujan poor, the refusal of universal provision is caste exclusion administered in neutral language."""
