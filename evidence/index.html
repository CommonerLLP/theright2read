<!DOCTYPE html>
<html lang="en-IN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Evidence — Right to Read</title>
<meta name="description" content="The Right to Read campaign's evidence: embeddable charts and lookups on India's public-library law and spending. Every chart is a permalink." />
<!--
  theright2read.org/evidence — the processed proof surface (data/ is the raw
  corpus; this is the evidence distilled from it). Wears the standard site chrome
  (masthead, nav, shared channels/colophon) via campaign.css + core/footer.js;
  ?embed=1 strips it for iframes. Hash-routed; two renderers (vanilla-SVG/canvas +
  lazy Apache ECharts) keyed off chart JSON. NO green (game-signal only).
-->
<script src="/assets/theme.js?v=76"></script>

<link rel="icon" type="image/svg+xml" href="/assets/favicon.svg?v=2">
<link rel="icon" type="image/png" sizes="32x32" href="/assets/favicon-32.png?v=2">
<link rel="icon" type="image/png" sizes="16x16" href="/assets/favicon-16.png?v=2">
<link rel="apple-touch-icon" sizes="180x180" href="/assets/apple-touch-icon.png?v=2">
<meta name="theme-color" content="#BD3341">

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;700&family=Source+Serif+4:opsz,wght@8..60,400;8..60,600;8..60,700&family=PT+Mono&family=Inter+Tight:wght@400;600;700&display=swap" rel="stylesheet" />

<link rel="stylesheet" href="/assets/tokens.css?v=76">
<link rel="stylesheet" href="/assets/campaign.css?v=76">
<style>
  /* chart colour aliases consumed by the SVG/canvas code — tokens.css has no
     --blue/--red-2/--grid-off, so define them here (and remap per theme). */
  :root { --blue: var(--rtr-blue); --red-2: var(--rtr-red-2); --grid-off: #e6e0d4; }
  :root[data-theme="dark"] { --blue: #7b95cf; --red-2: #d05661; --grid-off: #39332b; }
  @media (prefers-color-scheme: dark) {
    :root:not([data-theme="light"]) { --blue: #7b95cf; --red-2: #d05661; --grid-off: #39332b; }
  }

  #view { max-width: var(--maxw-read); margin: 0 auto; padding: 1.6rem 1.15rem 2.4rem; }

  /* figure card */
  #view figure {
    margin: 0 0 1.4rem; background: var(--surface); border: 1px solid var(--rule);
    border-radius: var(--radius); box-shadow: var(--shadow); overflow: hidden;
  }
  .fig-pad { padding: 1.05rem 1rem 1.2rem; }
  .fig-kicker {
    font-family: var(--font-mono); text-transform: uppercase; letter-spacing: .1em;
    font-size: .66rem; color: var(--accent); margin: 0 0 .3rem;
  }
  .fig-title {
    font-family: var(--font-display); font-weight: 700; font-size: 1.5rem;
    line-height: 1.1; margin: 0 0 1rem; color: var(--text);
  }
  #view figcaption {
    font-family: var(--font-serif); font-size: .92rem; line-height: 1.5;
    color: var(--text-muted); margin-top: 1rem;
  }
  #view figcaption b { color: var(--text); font-weight: 600; }
  .fig-src {
    font-family: var(--font-mono); font-size: .64rem; text-transform: uppercase;
    letter-spacing: .05em; color: var(--text-muted); margin-top: .7rem;
    padding-top: .6rem; border-top: 1px solid var(--rule);
  }
  .fig-tools { margin-top: .8rem; }
  .png-btn {
    font-family: var(--font-mono); text-transform: uppercase; letter-spacing: .08em;
    font-size: .62rem; cursor: pointer; background: transparent; color: var(--text-muted);
    border: 1px solid var(--rule); border-radius: var(--radius); padding: .34rem .66rem;
  }
  .png-btn:hover, .png-btn:focus-visible { border-color: var(--accent); color: var(--accent); }
  .hit { cursor: pointer; }
  .hit:focus { outline: 2px solid var(--accent); outline-offset: 2px; }

  /* index list */
  .idx-title { font-family: var(--font-display); font-weight: 700; font-size: var(--t-h2); margin: .2rem 0 1.2rem; }
  ul.idx { list-style: none; margin: 0; padding: 0; }
  ul.idx li { border-bottom: 1px solid var(--rule); }
  ul.idx a {
    display: flex; justify-content: space-between; align-items: baseline; gap: 1rem;
    padding: .9rem .2rem; text-decoration: none; color: var(--text);
  }
  ul.idx a:hover .t { color: var(--accent); }
  ul.idx .t { font-family: var(--font-ui); font-weight: 700; }
  ul.idx .s { font-family: var(--font-mono); font-size: .62rem; text-transform: uppercase; letter-spacing: .08em; color: var(--text-muted); }

  /* tooltip */
  #rtr-tip {
    position: fixed; z-index: 50; pointer-events: none; max-width: 260px;
    background: var(--text); color: var(--bg); font-family: var(--font-ui);
    font-size: .78rem; line-height: 1.4; padding: .5rem .6rem; border-radius: var(--radius);
    box-shadow: var(--shadow); opacity: 0; transition: opacity .12s var(--ease);
    transform: translate(-50%, calc(-100% - 10px));
  }
  #rtr-tip.on { opacity: 1; }
  #rtr-tip b { color: var(--bg); }

  /* embed mode — strip ALL site chrome for iframes, keep only the figure */
  .embed-cite { display: none; }
  body.embed .masthead, body.embed .flag, body.embed .nav-row,
  body.embed .channels, body.embed .colophon, body.embed .skip-link { display: none; }
  body.embed #view { padding: 0; max-width: none; }
  body.embed #view figure { margin: 0; border: none; box-shadow: none; background: transparent; }
  body.embed .embed-cite {
    display: block; font-family: var(--font-mono); font-size: .58rem;
    text-transform: uppercase; letter-spacing: .06em; color: var(--text-muted);
    text-align: right; margin-top: .4rem;
  }

  @media (max-width: 420px) {
    .fig-pad { padding: .95rem .8rem 1rem; }
    .fig-title { font-size: 1.3rem; }
  }
</style>
</head>
<body>
<a class="skip-link" href="#main">Skip to content</a>

</div>
