<?xml version="1.0" encoding="UTF-8"?>
<!-- RTR mark — mode-safe. Book outline = currentColor (adapts to light/dark);
     Ashoka chakra = brand red (#BD3341), constant. Transparent background.
     Inline this SVG in HTML so currentColor inherits the text colour. -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none"
     stroke="currentColor" stroke-width="4" stroke-linejoin="round" aria-hidden="true">
  <rect x="20" y="14" width="60" height="72" rx="3"/>
  <line x1="31" y1="14" x2="31" y2="86"/>
  <g stroke="#BD3341" stroke-width="3">
    <circle cx="57" cy="50" r="16"/>
    <line x1="60" y1="50" x2="73" y2="50"/>
    <line x1="54" y1="50" x2="41" y2="50"/>
    <line x1="57" y1="53" x2="57" y2="66"/>
    <line x1="57" y1="47" x2="57" y2="34"/>
    <line x1="59.1" y1="52.1" x2="68.3" y2="61.3"/>
    <line x1="54.9" y1="52.1" x2="45.7" y2="61.3"/>
    <line x1="54.9" y1="47.9" x2="45.7" y2="38.7"/>
    <line x1="59.1" y1="47.9" x2="68.3" y2="38.7"/>
  </g>
  <circle cx="57" cy="50" r="2.4" fill="#BD3341" stroke="none"/>
</svg>
