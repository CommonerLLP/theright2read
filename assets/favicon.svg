<?xml version="1.0" encoding="UTF-8"?>
<!--
  The Right To Read — favicon
  Constitution of India: cream cover on vermilion, with the
  24-spoke Ashoka Chakra inscribed on the cover.
  Tuned for legibility down to 16 px: the chakra fills more of
  the cover, and spokes are 3 units thick so they survive
  pixel-grid downsampling.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" shape-rendering="geometricPrecision">
  <rect width="100" height="100" fill="#dc2a14"/>

  <!-- Book cover (closed, portrait orientation) -->
  <rect x="14" y="8" width="72" height="84" rx="2" fill="#f1e8d3"/>

  <!-- Spine accent on left edge -->
  <rect x="14" y="8" width="6" height="84" fill="#dc2a14" opacity="0.18"/>
  <rect x="17" y="8" width="1.6" height="84" fill="#dc2a14"/>

  <!-- Top/bottom binding rules -->
  <rect x="22" y="14" width="58" height="1.6" fill="#dc2a14"/>
  <rect x="22" y="84.4" width="58" height="1.6" fill="#dc2a14"/>

  <!-- Ashoka Chakra (24 spokes), enlarged for small-size legibility -->
  <g transform="translate(50 50)" fill="none" stroke="#dc2a14" stroke-linecap="butt">
    <!-- outer ring -->
    <circle r="22" stroke-width="3.6"/>
    <!-- hub -->
    <circle r="3.2" fill="#dc2a14" stroke="none"/>
    <!-- 24 thick spokes -->
    <g stroke-width="3">
      <line x1="0" y1="-21" x2="0" y2="-3.4"/>
      <line x1="0" y1="21" x2="0" y2="3.4"/>
      <line x1="-21" y1="0" x2="-3.4" y2="0"/>
      <line x1="21" y1="0" x2="3.4" y2="0"/>
      <!-- 15° -->
      <line x1="-5.44" y1="-20.28" x2="-0.88" y2="-3.28"/>
      <line x1="5.44" y1="-20.28" x2="0.88" y2="-3.28"/>
      <line x1="-5.44" y1="20.28" x2="-0.88" y2="3.28"/>
      <line x1="5.44" y1="20.28" x2="0.88" y2="3.28"/>
      <!-- 30° -->
      <line x1="-10.50" y1="-18.19" x2="-1.70" y2="-2.94"/>
      <line x1="10.50" y1="-18.19" x2="1.70" y2="-2.94"/>
      <line x1="-10.50" y1="18.19" x2="-1.70" y2="2.94"/>
      <line x1="10.50" y1="18.19" x2="1.70" y2="2.94"/>
      <!-- 45° -->
      <line x1="-14.85" y1="-14.85" x2="-2.40" y2="-2.40"/>
      <line x1="14.85" y1="-14.85" x2="2.40" y2="-2.40"/>
      <line x1="-14.85" y1="14.85" x2="-2.40" y2="2.40"/>
      <line x1="14.85" y1="14.85" x2="2.40" y2="2.40"/>
      <!-- 60° -->
      <line x1="-18.19" y1="-10.50" x2="-2.94" y2="-1.70"/>
      <line x1="18.19" y1="-10.50" x2="2.94" y2="-1.70"/>
      <line x1="-18.19" y1="10.50" x2="-2.94" y2="1.70"/>
      <line x1="18.19" y1="10.50" x2="2.94" y2="1.70"/>
      <!-- 75° -->
      <line x1="-20.28" y1="-5.44" x2="-3.28" y2="-0.88"/>
      <line x1="20.28" y1="-5.44" x2="3.28" y2="-0.88"/>
      <line x1="-20.28" y1="5.44" x2="-3.28" y2="0.88"/>
      <line x1="20.28" y1="5.44" x2="3.28" y2="0.88"/>
    </g>
  </g>
</svg>
